services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    init: true
    env_file:
      - .env
    ports:
      - "${BACKEND_PUBLIC_PORT:-8000}:8000"
    volumes:
      - ./backend/data:/app/backend/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        API_SERVER_ORIGIN: http://backend:8000
        NEXT_PUBLIC_API_BASE_URL: ""
    init: true
    env_file:
      - .env
    ports:
      - "${FRONTEND_PUBLIC_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
